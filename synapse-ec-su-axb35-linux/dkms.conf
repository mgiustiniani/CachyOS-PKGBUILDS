PACKAGE_NAME="ec_su_axb35"
PACKAGE_VERSION="1.0.0"
MAKE[0]="make CC=clang LD=ld.lld"
BUILT_MODULE_NAME[0]="ec_su_axb35"
BUILT_MODULE_DIR[0]=""
DEST_MODULE_LOCATION[0]="/updates"
AUTOINSTALL="yes"
POST_BUILD="cp scripts/su_axb35_monitor /usr/local/bin/;
cp axb35-apply-settings /usr/local/bin/;
cp info.sh /usr/local/bin/;
cp test_fan_mode_fixed.sh /usr/local/bin/;
cp axb35-fan-control.service /usr/lib/systemd/system/;
echo ec_su_axb35 > /etc/modules-load.d/ec_su_axb35.conf"
